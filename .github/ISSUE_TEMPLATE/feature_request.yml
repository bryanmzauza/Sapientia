name: Feature request
description: Propose a new feature
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What need or pain does this feature solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: How you imagine the solution.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: input
    id: task-ref
    attributes:
      label: Related task (T-NNN)
      placeholder: T-NNN
