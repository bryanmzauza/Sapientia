ui:
  machine:
    title: "<gold>Máquina Sapientia</gold>"
    energy:
      title: "<aqua>Buffer de Energia</aqua>"
      value: "<gray><current>/<max> E</gray>"
      percent: "<gray><percent>%</percent></gray>"
    running: "<green>Em operação</green>"
    stopped: "<red>Parada</red>"
    click:
      start: "<gray>Clique para iniciar.</gray>"
      stop: "<gray>Clique para parar.</gray>"
