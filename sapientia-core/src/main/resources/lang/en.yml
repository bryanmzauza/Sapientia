# English catalog — Sapientia default locale.
# Keys use dotted notation: <area>.<subject>.<variant>. See docs/i18n-strategy.md.
plugin:
  enabled: "<green>Sapientia v<white><version></white> enabled.</green>"
  disabled: "<yellow>Sapientia disabled.</yellow>"
  reload:
    success: "<green>Configuration reloaded in <white><ms>ms</white>.</green>"
    failure: "<red>Reload failed: <white><error></white></red>"

command:
  unknown: "<red>Unknown command. Try <white>/sapientia help</white>.</red>"
  no-permission: "<red>You do not have permission to do that.</red>"
  players-only: "<red>This command can only be run by players.</red>"
  help:
    header: "<gold>=== Sapientia Help ===</gold>"
    entry: "<yellow><usage></yellow> <gray>-</gray> <white><description></white>"
    desc:
      help: "Show this help message."
      reload: "Reload configuration and catalogs."
      reload-content: "Reload YAML overrides without restarting the server."
      give: "Give a Sapientia item to a player."
      pack-build: "Build the Java resource pack into plugins/Sapientia/sapientia-resources.zip."
      pack-build-bedrock: "Build the Bedrock .mcpack and Geyser mappings into plugins/Sapientia/."
      pack-build-all: "Build both the Java pack and the Bedrock pack at once."
      logistics: "Inspect and manage item logistics networks."
      fluids: "Inspect Sapientia fluid logistics networks."
      logic: "Manage programmable-logic DAG programs."
  logistics:
    usage: "<red>Usage: /sapientia logistics <info|policy|filter></red>"
    info:
      none: "<yellow>No item logistics node nearby.</yellow>"
      header: "<gold>Filter at <white><x>,<y>,<z></white></gold> <gray>node=<node></gray>"
      network: "<gray>Network <white><network></white> · <count> node(s) · policy <policy></gray>"
      rule: "<gray>  <index>. <mode> <pattern></gray>"
      empty: "<gray>  (no rules — ACCEPT_ALL)</gray>"
    policy:
      usage: "<red>Usage: /sapientia logistics policy <round_robin|priority|first_match></red>"
      success: "<green>Routing policy set to <white><policy></white>.</green>"
      not-found: "<red>You must aim at a Sapientia logistics block.</red>"
    filter:
      usage: "<red>Usage: /sapientia logistics filter <add|remove|clear|list> [args]</red>"
      added: "<green>Rule added: <mode> <pattern></green>"
      removed: "<green>Removed rule <index>.</green>"
      cleared: "<green>All rules cleared.</green>"
      not-filter: "<red>Aim at a Sapientia item filter to edit rules.</red>"
      bad-mode: "<red>Mode must be <white>whitelist</white> or <white>blacklist</white>.</red>"
      bad-index: "<red>Invalid rule index: <white><value></white></red>"
  fluids:
    usage: "<red>Usage: /sapientia fluids <info></red>"
    info:
      none: "<yellow>No fluid logistics node nearby.</yellow>"
      header: "<gold>Fluid node at <white><x>,<y>,<z></white></gold> <gray>node=<node> type=<type></gray>"
      network: "<gray>Network <white><network></white> · <count> node(s)</gray>"
      tank: "<gray>Tank: <white><fluid></white> <amount>/<capacity> mB</gray>"
      empty: "<gray>(empty)</gray>"
  logic:
    usage: "<red>Usage: /sapientia logic <list|info|load|unload|enable|disable|export|tick> [name]</red>"
    unknown: "<red>Unknown logic program: <white><name></white></red>"
    list:
      header: "<gold>Logic programs (<white><count></white>):</gold>"
      entry: "<gray>  <white><name></white> · enabled=<enabled></gray>"
    info:
      header: "<gold>Logic program <white><name></white></gold> <gray>enabled=<enabled></gray>"
      size: "<gray>nodes=<white><nodes></white> edges=<white><edges></white></gray>"
    load:
      success: "<green>Loaded logic program <white><name></white> from <white><file></white>.</green>"
      io: "<red>Could not read logic file: <white><error></white></red>"
      invalid: "<red>Invalid logic program: <white><error></white></red>"
    unload:
      success: "<green>Unloaded logic program <white><name></white>.</green>"
    enable:
      success: "<green>Enabled logic program <white><name></white>.</green>"
    disable:
      success: "<green>Disabled logic program <white><name></white>.</green>"
    export:
      success: "<green>Exported logic program <white><name></white> to <white><path></white>.</green>"
      io: "<red>Could not write logic file: <white><error></white></red>"
    tick:
      success: "<green>Logic program <white><name></white> ticked once.</green>"
      failure: "<red>Logic tick failed: <white><error></white></red>"
  give:
    usage: "<red>Usage: /sapientia give <player> <id> [amount]</red>"
    success: "<green>Gave <white><amount></white> x <white><id></white> to <white><player></white>.</green>"
    unknown-item: "<red>Unknown item id: <white><id></white></red>"
    invalid-amount: "<red>Invalid amount: <white><value></white></red>"
    player-not-found: "<red>Player not found: <white><name></white></red>"
  reload:
    content:
      success: "<green>Overrides reloaded in <white><ms>ms</white> <gray>(items=<items> blocks=<blocks> recipes=<recipes>)</gray>.</green>"
      issues: "<yellow><count> validation issue(s) logged; check the server log.</yellow>"
  pack:
    usage: "<red>Usage: /sapientia pack build <java|bedrock|all></red>"
    success: "<green>Resource pack written to <white><path></white>.</green>"
    failure: "<red>Pack build failed: <white><error></white></red>"
    bedrock:
      success: "<green>Bedrock pack written to <white><pack></white>; mappings under <white><mappings></white>.</green>"
      unsupported: "<red>Unknown pack target. Use <white>java</white>, <white>bedrock</white> or <white>all</white>.</red>"

error:
  internal: "<red>An internal error occurred. Check the server log.</red>"

item:
  wrench:
    name: "<aqua>Sapientia Wrench</aqua>"
    lore: "<gray>Right-click to inspect Sapientia blocks.</gray>"
    desc: "Aim at an energy block while holding the wrench to see a live\nbuffer + network readout. No click needed."
  guide:
    name: "<gold>Sapientia Guide</gold>"
    lore: "<gray>Right-click to open the in-game guide.</gray>"
    desc: "Your field manual. Opens a chest UI listing every\nSapientia item, block and recipe you have unlocked."

block:
  pedestal:
    name: "<white>Sapientia Pedestal</white>"
    desc: "Decorative display block. Useful for showcasing\nitems or marking important locations."
  console:
    name: "<gold>Sapientia Console</gold>"
    desc: "Interactive demo block. Reserved for upcoming\nautomation and scripting UIs."
  generator:
    name: "<yellow>Sapientia Generator</yellow>"
    desc: "Produces energy each tick. Connect it to cables to\npower capacitors and consumers in the same network."
  cable:
    name: "<gray>Sapientia Cable</gray>"
    desc: "Links energy nodes. Forms a single network out of\nall adjacent (6-neighbour) Sapientia energy blocks."
  capacitor:
    name: "<aqua>Sapientia Capacitor</aqua>"
    desc: "Bulk energy buffer. Smooths spikes in generation\nand demand so consumers keep running."
  consumer:
    name: "<red>Sapientia Consumer</red>"
    desc: "Drains energy each tick. Demo sink used to verify\nthat your network is producing and delivering power."
  workbench:
    name: "<gold>Sapientia Workbench</gold>"
    desc: "Sapientia 3x3 crafting grid. Right-click to open\nand craft bundled Sapientia recipes."
  item_cable:
    name: "<gray>Sapientia Item Cable</gray>"
    desc: "Links item logistics nodes. Forms a single network\nout of all adjacent (6-neighbour) logistics blocks."
  item_producer:
    name: "<yellow>Sapientia Item Producer</yellow>"
    desc: "Pulls items each tick from an adjacent vanilla\ncontainer (chest, barrel, dispenser, ...)."
  item_consumer:
    name: "<aqua>Sapientia Item Consumer</aqua>"
    desc: "Pushes items each tick into an adjacent vanilla\ncontainer connected to the same logistics network."
  item_filter:
    name: "<gold>Sapientia Item Filter</gold>"
    desc: "Allow- or block-list items by id. Right-click to\nopen the filter summary; edit via /sapientia logistics filter."
  fluid_pipe:
    name: "<gray>Sapientia Fluid Pipe</gray>"
    desc: "Links fluid logistics nodes. Forms a single network\nout of all adjacent (6-neighbour) fluid blocks."
  fluid_pump:
    name: "<yellow>Sapientia Fluid Pump</yellow>"
    desc: "Pulls fluid each tick from an adjacent vanilla\nsource (water, lava, cauldron)."
  fluid_tank:
    name: "<aqua>Sapientia Fluid Tank</aqua>"
    desc: "Buffers fluid for the network. Holds one fluid\ntype at a time — no mixing."
  fluid_drain:
    name: "<gold>Sapientia Fluid Drain</gold>"
    desc: "Pushes fluid each tick into an adjacent vanilla\nsink (cauldron or replaceable air block)."

  cable_t2:
    name: "<gold>MV Cable</gold>"
    desc: "MV-tier energy cable. Carries up to 4x the throughput of the LV cable in the same network."
  capacitor_t2:
    name: "<gold>MV Capacitor</gold>"
    desc: "MV-tier bulk energy buffer. 4x the capacity of the LV capacitor."
  transformer_lv_mv:
    name: "<gold>LV/MV Transformer</gold>"
    desc: "Bridges an LV network to an MV network. Steps voltage up or down without burning cables."
  machine_casing:
    name: "<gold>Machine Casing</gold>"
    desc: "Shared LV-tier casing. Used as the core ingredient in every LV machine recipe."
  machine_casing_mv:
    name: "<gold>MV Machine Casing</gold>"
    desc: "Shared MV-tier casing. Used as the core ingredient in every MV machine recipe and the induction furnace."
  macerator:
    name: "<gold>Macerator</gold>"
    desc: "LV-tier machine. Grinds raw ore into 2x dust."
  ore_washer:
    name: "<gold>Ore Washer</gold>"
    desc: "LV-tier machine. Washes dust to remove impurities and recover byproducts."
  electric_furnace:
    name: "<gold>Electric Furnace</gold>"
    desc: "LV-tier machine. Smelts dust into ingot at twice the speed of a vanilla furnace."
  mixer:
    name: "<gold>Mixer</gold>"
    desc: "MV-tier machine. Combines two metal dusts into an alloy dust (bronze, brass, electrum)."
  compressor:
    name: "<gold>Compressor</gold>"
    desc: "MV-tier machine. Compacts plates and dusts into denser forms."
  bench_saw:
    name: "<gold>Bench Saw</gold>"
    desc: "LV-tier machine. Cuts rods into gears and screws."
  plate_press:
    name: "<gold>Plate Press</gold>"
    desc: "MV-tier machine. Rolls ingots into plates."
  extractor:
    name: "<gold>Extractor</gold>"
    desc: "MV-tier machine. Draws ingots into wire."
  induction_furnace_controller:
    name: "<gold>Induction Furnace Controller</gold>"
    desc: "MV multiblock controller. Surround with a 3x3x3 shell of MV machine casing or smooth basalt to form the structure."
  stainless_steel_casing:
    name: "<gold>Stainless Steel Casing</gold>"
    desc: "Refinery-grade casing. Used as the shell of the 5x5x7 oil refinery multiblock."
  pumpjack:
    name: "<gold>Pumpjack</gold>"
    desc: "MV-tier geo-extractor. Pulls crude oil from the chunk reservoir below."
  combustion_gen:
    name: "<gold>Combustion Generator</gold>"
    desc: "MV-tier generator. Burns diesel or gasoline into structured units of energy."
  biogas_gen:
    name: "<gold>Biogas Generator</gold>"
    desc: "LV-tier generator. Burns nutrient broth into a steady trickle of energy."
  cracker:
    name: "<gold>Cracker</gold>"
    desc: "MV-tier machine. Cracks heavy petroleum fractions into lighter ones."
  fermenter:
    name: "<gold>Fermenter</gold>"
    desc: "MV-tier machine. Ferments nutrient broth into biogas precursors."
  still:
    name: "<gold>Still</gold>"
    desc: "MV-tier machine. Distills fermented mash into purified fluids."
  bioreactor:
    name: "<gold>Bioreactor</gold>"
    desc: "LV-tier machine. Cultures organics into nutrient broth."
  oil_refinery_controller:
    name: "<gold>Oil Refinery Controller</gold>"
    desc: "Multiblock head of the 5x5x7 oil refinery. Splits crude oil into diesel, gasoline, lubricant and tar."
  cable_t3:
    name: "<aqua>HV Cable</aqua>"
    desc: "High-voltage cable. Carries up to 4096 J/t between HV machines."
  capacitor_t3:
    name: "<aqua>HV Capacitor</aqua>"
    desc: "High-voltage energy buffer. Stores massive amounts of energy."
  transformer_mv_hv:
    name: "<aqua>MV \u2194 HV Transformer</aqua>"
    desc: "Steps voltage between the MV and HV grids."
  geothermal_gen:
    name: "<aqua>Geothermal Generator</aqua>"
    desc: "HV generator. Extracts heat from nearby lava sources."
  gas_turbine:
    name: "<aqua>Gas Turbine</aqua>"
    desc: "HV generator. Burns combustible gases for steady power."
  rtg:
    name: "<aqua>RTG</aqua>"
    desc: "Radioisotope thermoelectric generator. Trickle HV power that never stops."
  electrolyzer:
    name: "<aqua>Electrolyzer</aqua>"
    desc: "HV machine. Splits fluids into their component gases."
  rolling_mill:
    name: "<aqua>Rolling Mill</aqua>"
    desc: "HV machine. Rolls ingots into plates and wires."
  laser_cutter:
    name: "<aqua>Laser Cutter</aqua>"
    desc: "HV machine. Cuts silicon wafers and precision parts."
  chemical_reactor:
    name: "<aqua>Chemical Reactor</aqua>"
    desc: "HV machine. Reacts gases and liquids under pressure."
  pressurized_pipe:
    name: "<aqua>Pressurized Pipe</aqua>"
    desc: "HV pipe. Routes high-pressure gases between machines."
  gas_compressor:
    name: "<gold>Gas Compressor</gold>"
    desc: "MV machine. Compresses atmospheric gases into stored mB."
  boiler:
    name: "<gold>Boiler</gold>"
    desc: "MV machine. Boils liquids into gases."
  condenser:
    name: "<gold>Condenser</gold>"
    desc: "MV machine. Condenses gases back into liquids."
  liquefier:
    name: "<aqua>Liquefier</aqua>"
    desc: "HV machine. Liquefies cryogenic gases."
  phase_separator:
    name: "<aqua>Phase Separator</aqua>"
    desc: "HV machine. Splits multi-phase fluid mixtures into pure outputs."

